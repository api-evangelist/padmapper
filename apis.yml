apis:
  - name: PadMapper Rental Listings
    description: PadMapper provides a web-based rental listing search service covering apartments, houses, condos, and rooms for rent across major US and Canadian cities. The platform is powered by Zumper and aggregates listings from multiple sources. There is no official public REST API; all access is through the PadMapper web application and mobile apps. Integrations for property managers are available indirectly through Zumper Pro.
